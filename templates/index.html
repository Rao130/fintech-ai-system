<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h2>Transaction Checker</h2>

    <input type="number" id="amount" placeholder="Amount"><br><br>
    <input type="number" id="time" placeholder="Time"><br><br>
    <input type="number" id="location" placeholder="Location"><br><br>
    <input type="text" id="user_id" placeholder="User ID">
    <button onclick="checkFraud()">Check</button>

    <h3 id="result"></h3>

    <h2>Transaction History</h2>
    <ul id="history"></ul>
    <div class="card">
        <h2>📊 Analytics</h2>
        <p>Total: <span id="total">0</span></p>
        <p>Fraud: <span id="fraud">0</span></p>
        <p>Safe: <span id="safe">0</span></p>
        <p>Fraud %: <span id="percent">0%</span></p>
    </div>
        <div class="card">
        <h2>📊 Fraud Analytics</h2>
        <canvas id="fraudChart"></canvas>
    </div>
    <div id="alertBox" style="display:none; background:red; color:white; padding:10px; border-radius:8px;">
        🚨 HIGH RISK TRANSACTION DETECTED!
    </div>
    <div class="container">
        <div class="layout">
    
            <!-- SIDEBAR -->
            <div class="sidebar">
                <h2>Fintech AI</h2>

                <a href="#">Dashboard</a>
                <a href="#">Transactions</a>
                <a href="#">Analytics</a>
                <a href="#">Alerts</a>
            </div>

            <!-- MAIN CONTENT -->
        <div class="container">
    </div>

    <script>
        function checkFraud() {
            const amount = document.getElementById("amount").value;
            const time = document.getElementById("time").value;
            const location = document.getElementById("location").value;
            const user_id = document.getElementById("user_id").value;
            fetch('/check_transaction', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    amount: amount,
                    time: time,
                    location: location,
                    user_id: user_id
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("aiText").innerText = data.ai_explanation;

                loadHistory(); // ✅ important
                loadAnalytics(); // ✅ important
                loadChart(); // ✅ important
            });
            if(data.alert){
                document.getElementById("alertBox").style.display = "block";
            } else {
                document.getElementById("alertBox").style.display = "none";
            }
        }

        function loadHistory() {
            fetch('/history')
            .then(res => res.json())
            .then(data => {
                let list = "";
                data.forEach(item => {
                    list += `<li>
                        ₹${item.amount} - ${item.result} (${item.risk_score}%)
                    </li>`;
                });
                document.getElementById("history").innerHTML = list;
            });
        }

        // Page load pe history show kare

        
        function loadAnalytics() {
            fetch('/analytics')
            .then(res => res.json())
            .then(data => {
                document.getElementById("total").innerText = data.total;
                document.getElementById("fraud").innerText = data.fraud;
                document.getElementById("safe").innerText = data.safe;
                document.getElementById("percent").innerText = data.fraud_percent + "%";
            });
        }
        window.onload = function() {
            loadHistory();
            loadAnalytics();
            loadChart();
        }
        let chart;

        function loadChart() {
            fetch('/analytics')
            .then(res => res.json())
            .then(data => {

                const ctx = document.getElementById('fraudChart');

                if(chart) {
                    chart.destroy();
                }

                chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Fraud', 'Safe'],
                        datasets: [{
                            data: [data.fraud, data.safe],
                            backgroundColor: ['#ef4444', '#22c55e']
                        }]
                    },
                    options: {
                        plugins: {
                            legend: {
                                labels: {
                                    color: 'white'
                                }
                            }
                        }
                    }
                });
            });
        }
    </script>

</body>
</html>
