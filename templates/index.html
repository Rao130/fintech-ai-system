<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection System</title>
</head>
<body>

    <h2>Transaction Checker</h2>

    <input type="number" id="amount" placeholder="Amount"><br><br>
    <input type="number" id="time" placeholder="Time"><br><br>
    <input type="number" id="location" placeholder="Location"><br><br>

    <button onclick="checkFraud()">Check</button>

    <h3 id="result"></h3>

    <h2>Transaction History</h2>
    <ul id="history"></ul>

    <script>
        function checkFraud() {
            const amount = document.getElementById("amount").value;
            const time = document.getElementById("time").value;
            const location = document.getElementById("location").value;

            fetch('/check_transaction', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    amount: amount,
                    time: time,
                    location: location
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText =
                    data.result + " | Risk Score: " + data.risk_score + "%";

                loadHistory(); // ✅ important
            });
        }

        function loadHistory() {
            fetch('/history')
            .then(res => res.json())
            .then(data => {
                let list = "";
                data.forEach(item => {
                    list += `<li>
                        ₹${item.amount} - ${item.result} (${item.risk_score}%)
                    </li>`;
                });
                document.getElementById("history").innerHTML = list;
            });
        }

        // Page load pe history show kare
        window.onload = loadHistory;
    </script>

</body>
</html>
